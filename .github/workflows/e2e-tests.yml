name: E2E Tests - OrangeHRM

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run tests"
        required: true
        default: "demo"
        type: choice
        options:
          - demo
          - dev

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          CI: true
          ENV_NAME: ${{ github.event.inputs.environment || 'demo' }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: npm run test_dev

      - name: Generate test report
        if: always()
        run: npx playwright show-report --quiet || true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let testInfo = '## 🧪 E2E Test Results\n\n';
            testInfo += `**Environment:** ${{ github.event.inputs.environment || 'demo' }}\n`;
            testInfo += `**Node Version:** ${{ matrix.node-version }}\n\n`;

            try {
              const resultsPath = 'test-results/results.json';
              if (fs.existsSync(resultsPath)) {
                const testResults = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
                const stats = testResults.stats || {};

                testInfo += `| Metric | Count |\n`;
                testInfo += `|--------|-------|\n`;
                testInfo += `| ✅ Passed | ${stats.expected || 0} |\n`;
                testInfo += `| ❌ Failed | ${stats.unexpected || 0} |\n`;
                testInfo += `| ⏭️ Skipped | ${stats.skipped || 0} |\n`;
              } else {
                testInfo += '⚠️ No test results file found.\n';
              }
            } catch (error) {
              testInfo += `⚠️ Error reading test results: ${error.message}\n`;
            }

            testInfo += `\n[📊 View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: testInfo
            });

  notify:
    if: failure()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Notify test failure
        run: |
          echo "❌ E2E tests failed on commit ${{ github.sha }}"
          echo "View details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
