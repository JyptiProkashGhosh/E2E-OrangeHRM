name: Playwright Smoke Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  smoke-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: OrangeHRMadvance

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: OrangeHRMadvance/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright Version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -p "require('./package.json').devDependencies['@playwright/test']")" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        id: cache-playwright-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}

      - name: Install Playwright Browsers (Chromium only for speed)
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install System Dependencies for Chromium
        if: steps.cache-playwright-browsers.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Smoke Tests
        run: npx playwright test --grep "@smoke"
        env:
          CI: true

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/checkout@v4 # No-op or we just upload the directory directly
        # Note: actions/upload-artifact@v4 is used to upload artifacts
        continue-on-error: true

      - name: Publish Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: OrangeHRMadvance/playwright-report/
          retention-days: 7
